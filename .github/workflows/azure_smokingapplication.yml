# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - SmokingApplication

on:
  push:
    branches:
      - azure

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      jar_file_name: ${{ steps.get_jar_name.outputs.JAR_FILE_NAME }} # Truyền tên file JAR làm output của job build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Build with Maven
        env:
          CLD_KEY: ${{ secrets.CLD_KEY }}
          CLD_NAME: ${{ secrets.CLD_NAME }}
          CLD_SECRET: ${{ secrets.CLD_SECRET }}
          GEMINI_API_URL: ${{ secrets.GEMINI_API_URL }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REDIRECT_URI: ${{ secrets.GOOGLE_REDIRECT_URI }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          VNPAY_HASH_SECRET: ${{ secrets.VNPAY_HASH_SECRET }}
          VNPAY_TMN_CODE: ${{ secrets.VNPAY_TMN_CODE }}
          VNPAY_URL: ${{ secrets.VNPAY_URL }}
        run: mvn clean install -DskipTests

      - name: Get JAR file name
        id: get_jar_name
        run: echo "JAR_FILE_NAME=$(ls target/*.jar | xargs basename)" >> $GITHUB_OUTPUT # Sửa $GITHUB_ENV thành $GITHUB_OUTPUT

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/target/${{ steps.get_jar_name.outputs.JAR_FILE_NAME }}'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_611C6209C7254618915B23804994A77C }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2CE55ADA8E884B2A92F8B47250DA292C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6222BEDD08B1441AABB0F6AE8B1C8C1C }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'SmokingApplication'
          slot-name: 'Production'
          # Chỉ định chính xác tên file JAR đã được tìm thấy ở job build
          package: ${{ needs.build.outputs.jar_file_name }}
